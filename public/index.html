<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>陪玩店 - 欢迎光临</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="video-bg"><video id="bg-video" src="/video/bg.mp4" muted loop autoplay playsinline></video></div>
  <div id="video-overlay"></div>
  <div id="app">
    <!-- 左侧边栏 -->
    <aside id="sidebar">
      <div class="logo" onclick="showHome()">
        <span class="logo-icon">🐾</span>
        <span class="logo-text">白君的俱乐部</span>
      </div>

      <!-- 用户状态 -->
      <div id="user-section" class="user-section">
        <div id="user-logged-out">
          <button class="btn-auth" onclick="showLogin()">登录</button>
          <button class="btn-auth btn-auth-reg" onclick="showRegister()">注册</button>
        </div>
        <div id="user-logged-in" class="hidden">
          <div class="user-info" id="user-info-display">
            <span class="user-icon">👤</span>
            <span id="user-name-display">用户</span>
          </div>
          <button class="btn-auth btn-auth-out" onclick="logoutUser()">退出</button>
        </div>
      </div>

      <nav id="category-nav">
        <!-- 分类由 JS 动态加载 -->
      </nav>
      <div class="sidebar-footer">
        <button class="cart-btn" onclick="showCart()">🛅 我的订单</button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main id="main-content">
      <!-- 首页 -->
      <div id="page-home" class="page active">
        <div class="hero">
          <h1>🐾 欢迎来到白君的俱乐部</h1>
          <p>专业游戏服务 · 极致体验 · 快速上分</p>
          <div class="hero-categories" id="hero-categories"></div>
        </div>
      </div>

      <!-- 分类菜品浏览 -->
      <div id="page-category" class="page">
        <div class="page-header">
          <h2 id="category-title">分类</h2>
        </div>
        <div class="menu-grid" id="menu-grid"></div>
      </div>

      <!-- 菜品详情 -->
      <div id="page-detail" class="page">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <div id="detail-content"></div>
      </div>

      <!-- 订单列表 -->
      <div id="page-cart" class="page">
        <div class="page-header">
          <h2>🛅 我的订单</h2>
        </div>
        <div id="order-list"></div>
      </div>

      <!-- 聊天窗口 -->
      <div id="page-chat" class="page">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <div id="chat-content"></div>
      </div>
    </main>
  </div>

  <!-- ================== 登录弹窗 ================== -->
  <div id="login-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-box-header">
        <h3>🔑 登录</h3>
        <span class="modal-close-btn" onclick="closeLoginModal()">&times;</span>
      </div>
      <div class="modal-box-body">
        <label><span>用户名</span><input id="login-username" placeholder="输入用户名"></label>
        <label><span>密码</span><input id="login-password" type="password" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()"></label>
        <div class="modal-box-actions">
          <button class="btn btn-primary" onclick="doLogin()">登录</button>
          <span class="modal-link" onclick="closeLoginModal();showRegister()">没有账号？去注册</span>
        </div>
        <div id="login-error" class="form-error hidden"></div>
      </div>
    </div>
  </div>

  <!-- ================== 注册弹窗 ================== -->
  <div id="register-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-box-header">
        <h3>📝 注册</h3>
        <span class="modal-close-btn" onclick="closeRegisterModal()">&times;</span>
      </div>
      <div class="modal-box-body">
        <label><span>用户名</span><input id="reg-username" placeholder="设置用户名"></label>
        <label><span>密码</span><input id="reg-password" type="password" placeholder="设置密码"></label>
        <label><span>邮箱</span><input id="reg-email" type="email" placeholder="绑定邮箱（选填）"></label>
        <label><span>验证码</span>
          <div class="captcha-row">
            <input id="reg-captcha" placeholder="输入6位验证码" maxlength="4">
            <div class="captcha-box" id="captcha-display" onclick="refreshCaptcha()">----</div>
          </div>
        </label>
        <div class="modal-box-actions">
          <button class="btn btn-primary" onclick="doRegister()">注册</button>
          <span class="modal-link" onclick="closeRegisterModal();showLogin()">已有账号？去登录</span>
        </div>
        <div id="register-error" class="form-error hidden"></div>
      </div>
    </div>
  </div>

  <!-- 通知弹窗 -->
  <div id="notification-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/app.js"></script>
  <input type="hidden" id="login-bg-url" value="">
  <audio id="bgm-audio" src="/music/bgm.m4a" loop preload="auto"></audio>
  <div id="music-player">
    <button id="music-toggle" onclick="toggleMusic()" title="背景音乐开关">🎵</button>
  </div>
</body>
</html>
